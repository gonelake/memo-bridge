<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 120" width="360" height="120">
  <defs>
    <linearGradient id="bridgeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="arcGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#c4b5fd;stop-opacity:0.4" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Bridge deck (horizontal road) -->
  <rect x="30" y="65" width="300" height="6" rx="3" fill="url(#bridgeGrad)" opacity="0.9"/>

  <!-- Left tower -->
  <rect x="70" y="32" width="8" height="39" rx="2" fill="#6366f1"/>
  <!-- Right tower -->
  <rect x="282" y="32" width="8" height="39" rx="2" fill="#8b5cf6"/>

  <!-- Bridge cables (catenary arcs) -->
  <path d="M74 32 Q180 8 286 32" stroke="url(#arcGrad)" stroke-width="2.5" fill="none" filter="url(#glow)"/>
  <!-- Vertical hanger lines -->
  <line x1="110" y1="21" x2="110" y2="65" stroke="#a78bfa" stroke-width="1.2" opacity="0.6"/>
  <line x1="145" y1="14" x2="145" y2="65" stroke="#a78bfa" stroke-width="1.2" opacity="0.6"/>
  <line x1="180" y1="12" x2="180" y2="65" stroke="#a78bfa" stroke-width="1.2" opacity="0.6"/>
  <line x1="215" y1="14" x2="215" y2="65" stroke="#a78bfa" stroke-width="1.2" opacity="0.6"/>
  <line x1="250" y1="21" x2="250" y2="65" stroke="#a78bfa" stroke-width="1.2" opacity="0.6"/>

  <!-- Memory nodes: left side -->
  <circle cx="30" cy="68" r="9" fill="#4f46e5" filter="url(#glow)"/>
  <text x="30" y="72" text-anchor="middle" font-size="8" fill="white" font-family="monospace">M</text>

  <!-- Memory nodes: right side -->
  <circle cx="330" cy="68" r="9" fill="#7c3aed" filter="url(#glow)"/>
  <text x="330" y="72" text-anchor="middle" font-size="8" fill="white" font-family="monospace">M</text>

  <!-- Spark / transfer dots along bridge -->
  <circle cx="145" cy="65" r="3" fill="#c4b5fd" opacity="0.85"/>
  <circle cx="180" cy="65" r="4" fill="#e9d5ff" opacity="0.95" filter="url(#glow)"/>
  <circle cx="215" cy="65" r="3" fill="#c4b5fd" opacity="0.85"/>

  <!-- Wordmark -->
  <text x="180" y="100" text-anchor="middle" font-size="22" font-weight="700"
        font-family="'Segoe UI', system-ui, -apple-system, sans-serif"
        fill="url(#bridgeGrad)" letter-spacing="0.5">MemoBridge</text>
  <text x="180" y="115" text-anchor="middle" font-size="9"
        font-family="'Segoe UI', system-ui, -apple-system, sans-serif"
        fill="#94a3b8" letter-spacing="1.5">AI MEMORY MIGRATION</text>
</svg>
